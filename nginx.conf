# OpenLearnV2 — Production Nginx Configuration (PM2 deployment)
# v5.0+: 白板和课件已内聚为主应用本地模块，不再需要 MFE 独立部署
upstream openlearn_backend {
    server 127.0.0.1:9000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;  # 匹配所有请求（IP 或域名访问）

    # ── Root: Host Shell 构建产物 ──────────────────────────────────────────
    root /home/wuxf/Develop/openlearnv2/dist;  # 修改为实际项目路径
    index index.html;

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # ── SPA fallback ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Uploads（静态，Nginx 直出） ──────────────────────────────────────────
    location /uploads/ {
        alias /home/wuxf/Develop/openlearnv2/uploads/;  # 修改为实际项目路径
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── API Reverse Proxy ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://openlearn_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API 不缓存
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # ── Socket.IO WebSocket ────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://openlearn_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Courseware runtime ─────────────────────────────────────────────────
    location /runtime/ {
        proxy_pass http://openlearn_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static assets（长期缓存） ────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── Health check ───────────────────────────────────────────────────────
    location /health {
        proxy_pass http://openlearn_backend/health;
        access_log off;
    }

    # ── Error pages ────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
