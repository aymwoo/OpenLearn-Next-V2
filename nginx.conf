# OpenLearn Next V2 - Production Nginx Configuration
# This configuration is designed for deploying the built service under a single domain.

upstream openlearn_backend {
    server 127.0.0.1:9000;
    keepalive 32;
}

# (Optional) Upstream servers if running MFEs on separate processes
upstream mfe_whiteboard_server {
    server 127.0.0.1:5174;
}

upstream mfe_courseware_server {
    server 127.0.0.1:5175;
}

server {
    listen 80;
    server_name openlearn.example.com; # Replace with your domain name or server IP address

    # Root directory pointing to the built main frontend (host shell)
    root /home/wuxf/Develop/openlearnv2/dist;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # Host Shell SPA Frontend Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static uploads directory served directly by Nginx for high performance
    location /uploads/ {
        alias /home/wuxf/Develop/openlearnv2/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # API Backend Reverse Proxy
    location /api/ {
        proxy_pass http://openlearn_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable cache for API endpoints
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Socket.io WebSockets Reverse Proxy
    location /socket.io/ {
        proxy_pass http://openlearn_backend;
        proxy_http_version 1.1;
        
        # WebSocket Upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering and set timeouts for keep-alive WebSockets
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Option A: Nginx serving built MFEs statically (Recommended) ──
    # Builds the sub-projects and hosts them directly on Nginx.
    # Note: Requires building MFE packages with respective bases or relative routes.
    location /mfe/whiteboard/ {
        alias /home/wuxf/Develop/openlearnv2/packages/mfe-whiteboard/dist/;
        try_files $uri $uri/ =404;
        expires 1d;
        add_header Access-Control-Allow-Origin "*"; # Enable CORS for federation assets
    }

    location /mfe/courseware/ {
        alias /home/wuxf/Develop/openlearnv2/packages/mfe-courseware/dist/;
        try_files $uri $uri/ =404;
        expires 1d;
        add_header Access-Control-Allow-Origin "*";
    }

    # ── Option B: Reverse proxying MFEs to static node servers ──────
    # Alternatively, you can run separate static server processes (e.g. via pm2) and proxy to them.
    #
    # location /mfe/whiteboard/ {
    #     proxy_pass http://mfe_whiteboard_server/;
    #     proxy_set_header Host $host;
    # }
    #
    # location /mfe/courseware/ {
    #     proxy_pass http://mfe_courseware_server/;
    #     proxy_set_header Host $host;
    # }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
