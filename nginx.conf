# OpenLearnV2 — Production Nginx Configuration (PM2 deployment)
# vhost for: openlearn.example.com
#
# Usage:
#   sudo ln -sf /home/wuxf/Develop/openlearnv2/nginx.conf /etc/nginx/sites-enabled/openlearnv2.conf
#   sudo nginx -t && sudo nginx -s reload

# ── Upstream: PM2-managed backend on localhost:9000 ────────────────────────
upstream openlearn_backend {
    server 127.0.0.1:9000;
    keepalive 32;
}

server {
    listen 80;
    server_name openlearn.example.com; # 替换为实际域名或 IP

    # ── Root: Host Shell 构建产物 ──────────────────────────────────────────
    root /home/wuxf/Develop/openlearnv2/dist;
    index index.html;

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # ── SPA fallback ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Uploads（静态，Nginx 直出） ──────────────────────────────────────────
    location /uploads/ {
        alias /home/wuxf/Develop/openlearnv2/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── API Reverse Proxy ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://openlearn_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API 不缓存
        add_header Cache-Control "no-store, no-cache, must-revalidate,
                                  proxy-revalidate, max-age=0";
    }

    # ── Socket.IO WebSocket ────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://openlearn_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── MFE Remote（Nginx 直出 dist，不走 Node） ────────────────────────────
    location /mfe/whiteboard/ {
        alias /home/wuxf/Develop/openlearnv2/packages/mfe-whiteboard/dist/;
        try_files $uri $uri/ =404;
        expires 1d;
        add_header Access-Control-Allow-Origin "*";
    }

    location /mfe/courseware/ {
        alias /home/wuxf/Develop/openlearnv2/packages/mfe-courseware/dist/;
        try_files $uri $uri/ =404;
        expires 1d;
        add_header Access-Control-Allow-Origin "*";
    }

    # ── Courseware runtime（通过代理？不需要，走 /runtime/ 在 Node 内处理） ──
    location /runtime/ {
        proxy_pass http://openlearn_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static assets（长期缓存） ────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── Health check for upstream monitoring ───────────────────────────────
    location /health {
        proxy_pass http://openlearn_backend/api/health;
        access_log off;
    }

    # ── Error pages ────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
